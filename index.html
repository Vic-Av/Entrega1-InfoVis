<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">

        <title>Proto</title>

        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    </head>

    <body>
        <div id="grafico-sismos" style="width:1200px;height:2000px"></div>
        <script>

            async function grafico_sismos() {
                const llamado_datos = await fetch('../datos-regiones.json');
                const datos = await llamado_datos.json();

                const lista_frecuencia = datos.map(tupla => parseInt(tupla.cuenta_magnitudes));
                const lista_promedio = datos.map(tupla => parseFloat(tupla.promedio_magnitudes));

                const datos_grafico = [{
                    x: lista_frecuencia,
                    y: lista_promedio,
                    mode: 'markers',
                    type: 'scatter'
                }];



                const forma = {
                    margin: {t : 40},
                    title: {text: 'Sismos en Chile Divididos por Región'},
                    annotations: [

                    ]
                };

                Plotly.newPlot('grafico-sismos', datos_grafico, forma, {displayModeBar: false});
            }

            grafico_sismos();

        </script>








    </body>
</html>
