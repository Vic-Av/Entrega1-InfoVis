<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">

        <title>Fichajes</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

        <style>
            body{
                margin: 0;
                padding: 0;
                background: #000000;
            }

            .header {
                padding: 20px;
                text-align: center;
                background: #1d1d1d;
                color: white;
                font-family: "Roboto", sans-serif;
            }

        </style>




    </head>

    <body>
        <div class="header">
                <h1>Inflación del Mercado de Fichajes</h1>
                <h2>El récord del fichaje del fútbol más caro (1956 - 2017) y su ajuste a la inflación de Q2 2026.</h2>
        </div>


        <div id="grafico-fichajes" style="width: 100%;height:70%"></div>
        <script>
            async function grafico_fichajes() {
                const llamado_datos = await fetch('./datos-fichajes.json');
                const datos = await llamado_datos.json();

                const lista_años = (datos.map(tupla => (tupla['fecha_fichaje'].split("/"))[2])).reverse();

                lista_años[10] = '1997 (A)';
                lista_años[11] = '1997 (R)';
                lista_años[14] = '2000 (C)';
                lista_años[15] = '2000 (F)';

                const lista_records = (datos.map(tupla => parseFloat(tupla['coste']))).reverse();
                const lista_inflados = (datos.map(tupla => parseFloat(tupla['precio_ajustado']))).reverse();


                const datos_records = {
                    x: lista_años,
                    y: lista_records,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: {color: 'red', symbol: 'diamond'}
                };

                const datos_inflados = {
                    x: lista_años,
                    y: lista_inflados,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: {color: 'blue', symbol: 'diamond'}
                };
                
                const forma = {
                    yaxis: {nticks: 40, rangemode: 'nonnegative'},
                    xaxis: {dtick: "M12", range: ['1955-01-01', '2018-01-01'], type: 'category'},
                };

                Plotly.newPlot('grafico-fichajes', [datos_records, datos_inflados], forma);
            };

            grafico_fichajes();

        </script>


    </body>
</html>
