<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">

        <title>Inflación de Fichajes</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

        <style>
            body{
                margin: 0;
                padding: 0;
                background: #000000;
            }

            .header {
                padding: 1px;
                text-align: center;
                background: #1d1d1d;
                color: white;
                font-family: "Roboto", sans-serif;
            }

        </style>




    </head>

    <body>
        <div class="header">
                <h1 style="font-family: 'Roboto', sans-serif">Inflación del Mercado de Fichajes</h1>
                <div style="font-family: 'Roboto', sans-serif">La historia del récord de fichaje más caro en el fútbol (1956 - 2017), medido en millones de euros, con su ajuste a la inflación para la actualidad (abril de 2026).</div>
        </div>


        <div id="grafico-fichajes" style="width: 100%;height: 520px;padding: 0px"></div>
        <script>
            async function grafico_fichajes() {
                const llamado_datos = await fetch('./datos-fichajes.json');
                const datos = await llamado_datos.json();
            
                
                const datosOrdenados = datos.reverse();
            
                const lista_fechas = datosOrdenados.map(t => t.fecha_fichaje.split("/")[2]);
                
                lista_fechas[10] = '1997 (A)';
                lista_fechas[11] = '1997 (R)';
                lista_fechas[14] = '2000 (C)';
                lista_fechas[15] = '2000 (F)';
            
                const lista_records = datosOrdenados.map(t => parseFloat(t.coste));
                const lista_inflados = datosOrdenados.map(t => parseFloat(t.precio_ajustado));
                const lista_nombres = datosOrdenados.map(t => t.jugador);
            
                
                const lista_hovers = datosOrdenados.map(t => {
                    let nombre = t.jugador;
                    let extension = ".webp";
                    let archivo = "";
            
                   
                    if (nombre.includes("Cristiano Ronaldo")) { archivo = "cristiano"; }
                    else if (nombre.includes("Ronaldo Nazário")) { archivo = "ronaldo"; }
                    else if (nombre.includes("Raul Conti")) { archivo = "conti"; extension = ".jpg"; }
                    else {
                        
                        archivo = nombre.split(" ").pop().toLowerCase()
                                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    }
            
                    return `
                        <div style="text-align:center; font-family:'Roboto'; padding:10px;">
                            <img src="img/${archivo}${extension}" style="width:80px; height:80px; border-radius:50%; margin-bottom:5px;">
                            <br>
                            <b>${nombre}</b><br>
                            <span>${t.ultimo_club} &#10132; ${t.nuevo_club}</span><br>
                            <b style="color:red;">${t.coste} M€</b>
                        </div>
                    `;
                });
            
                const lista_etiquetas = [];
                for (let i = 0; i < 21; i++) {
                    lista_etiquetas.push({
                        x: i,
                        y: lista_inflados[i] + 40,
                        textangle: -90,
                        xref: 'x', yref: 'y',
                        text: lista_nombres[i],
                        showarrow: false,
                        font: { family: 'Roboto', color: 'white' },
                        bgcolor: '#000000'
                    });
                }
            
                
                const datos_records = {
                    x: lista_fechas,
                    y: lista_records,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: { color: 'blue', symbol: 'circle', size: 10 },
                    name: 'Costo Original',
                    hoverinfo: 'none' 
                };
            
                const datos_inflados = {
                    x: lista_fechas,
                    y: lista_inflados,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: { color: 'red', symbol: 'diamond', size: 10 },
                    name: 'Costo Ajustado',
                    text: lista_hovers, 
                    hoverinfo: 'text' 
                };
            
                const forma = {
                    hovermode: 'closest',
                    yaxis: { title: { text: 'Costo en millones de euros (€)' }, showgrid: true, gridcolor: '#333333', color: 'lightgray' },
                    xaxis: { title: { text: 'Año del Récord' }, showgrid: false, type: 'category', color: 'lightgray' },
                    plot_bgcolor: 'black',
                    paper_bgcolor: 'black',
                    annotations: lista_etiquetas,
                    legend: { orientation: 'h', font: { color: 'white' } },
                    margin: { l: 60, r: 10, b: 40, t: 10 }
                };
            
                Plotly.newPlot('grafico-fichajes', [datos_records, datos_inflados], forma, { staticPlot: false });
            }
            
            grafico_fichajes();

        </script>


    </body>
</html>
