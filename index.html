<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">

        <title>Inflación de Fichajes</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

        <style>
            body{
                margin: 0;
                padding: 0;
                background: #000000;
            }

            .header {
                padding: 1px;
                text-align: center;
                background: #1d1d1d;
                color: white;
                font-family: "Roboto", sans-serif;
            }

        </style>




    </head>

    <body>
        <div class="header">
                <h1 style="font-family: 'Roboto', sans-serif">Inflación del Mercado de Fichajes</h1>
                <div style="font-family: 'Roboto', sans-serif">La historia del récord de fichaje más caro en el fútbol (1956 - 2017), medido en millones de euros, con su ajuste a la inflación para la actualidad (abril de 2026).</div>
        </div>


        <div id="grafico-fichajes" style="width: 100%;height: 520px;padding: 0px"></div>
        <script>
            async function grafico_fichajes() {
                const llamado_datos = await fetch('./datos-fichajes.json');
                const datos = await llamado_datos.json();

                const lista_fechas = (datos.map(tupla => (tupla['fecha_fichaje'].split("/"))[2])).reverse();

                lista_fechas[10] = '1997 (A)';
                lista_fechas[11] = '1997 (R)';
                lista_fechas[14] = '2000 (C)';
                lista_fechas[15] = '2000 (F)';

                const lista_records = (datos.map(tupla => parseFloat(tupla['coste']))).reverse();
                const lista_inflados = (datos.map(tupla => parseFloat(tupla['precio_ajustado']))).reverse();


                const lista_nombres = (datos.map(tupla => tupla['jugador'])).reverse();
                const lista_etiquetas = [];

                for (let i=0; i<21; i++){
                    lista_etiquetas.push(
                        {
                            x: i,
                            y: lista_inflados[i]+40,
                            textangle: -90,
                            xref: 'x',
                            yref: 'y',
                            text: lista_nombres[i],
                            showarrow: false,
                            font: {
                                family: 'Roboto',
                                color: 'white'
                            },
                            bgcolor: '#000000'
                        }
                    );
                };

                lista_etiquetas.push(
                    {
                        x: 10.5,
                        y: 140,
                        xref: 'x',
                        yref: 'y',
                        text: "El fichaje de Ronaldo batió rápidamente el <br>otro récord establecido en julio de 1997.",
                        showarrow: false,
                        font: {
                            family: 'Roboto',
                            color: 'white',
                            size: 12
                        },
                        bgcolor: '#1f1f1f',
                        bordercolor: 'white'
                    },
                    {
                        x: 14.5,
                        y: 180,
                        xref: 'x',
                        yref: 'y',
                        text: "El costo del fichaje de Figo superó a <br>aquel de Crespo el mismo año.",
                        showarrow: false,
                        font: {
                            family: 'Roboto',
                            color: 'white',
                            size: 12
                        },
                        bgcolor: '#1f1f1f',
                        bordercolor: 'white'
                    }
                );

                const datos_records = {
                    x: lista_fechas,
                    y: lista_records,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: {color: 'blue', symbol: 'circle', size: 8},
                    name: 'Costo en M€ según valor de € en fecha de récord'
                };

                const datos_inflados = {
                    x: lista_fechas,
                    y: lista_inflados,
                    mode: "lines+markers",
                    type: "scatter",
                    marker: {color: 'red', symbol: 'diamond', size: 8},
                    name: 'Costo en M€ según el valor de € hoy'
                };
                
                const forma = {
                    yaxis: {title: {text: 'Costo en millones de euros (€)'}, nticks: 40, rangemode: 'nonnegative', color: 'lightgray', gridcolor: 'gray'},
                    xaxis: {title: {text: 'Año de cada nuevo récord'}, dtick: "M12", range: ['1955-01-01', '2018-01-01'], type: 'category', color: 'lightgray', gridcolor: 'gray'},
                    plot_bgcolor: 'black',
                    paper_bgcolor: 'black',
                    annotations: lista_etiquetas,
                    margin: {
                        l: 60,
                        r: 10,
                        b: 40,
                        t: 10
                    },
                    legend: {
                        orientation: 'h',
                        yanchor: 'bottom',
                        font: {
                            color: 'white'
                        }
                    }
                };

                Plotly.newPlot('grafico-fichajes', [datos_records, datos_inflados], forma, {staticPlot: 'true'});
            };

            grafico_fichajes();

        </script>


    </body>
</html>
