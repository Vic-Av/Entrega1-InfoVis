<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inflación de Fichajes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            font-family: "Roboto", sans-serif;
            color: white;
        }

        .header {
            padding: 10px;
            text-align: center;
            background: #1d1d1d;
        }

        /* Contenedor para que el gráfico y el panel estén lado a lado */
        .main-content {
            display: flex;
            width: 100%;
            height: 550px;
        }

        #grafico-fichajes {
            flex: 3; /* El gráfico toma más espacio */
        }

        /* Panel lateral estilizado */
        #panel-info {
            flex: 1;
            background: #0a0a0a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0; /* Invisible hasta que hagamos hover */
            transition: opacity 0.3s ease;
        }

        #foto-jugador {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid red;
            background-size: cover;
            background-position: center;
            margin-bottom: 15px;
        }

        .texto-info { text-align: center; }
        .nombre { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; }
        .clubes { color: #aaa; font-style: italic; margin-bottom: 15px; }
        .precio { font-size: 1.8em; color: #ff4d4d; font-weight: 900; }
        .precio-original { font-size: 1.2em; color: #3b82f6; /* Azul para el costo original */margin-top: 10px; }
        .label-precio { font-size: 0.6em; color: #666; display: block; text-transform: uppercase; }
    </style>
</head>

<body>
    <div class="header">
        <h1>Inflación del Mercado de Fichajes</h1>
        <div>La historia del récord de fichaje más caro en el fútbol (1956 - 2017), medido en millones de euros, con su ajuste a la inflación.</div>
    </div>

    <div class="main-content">
        <div id="grafico-fichajes"></div>

        <div id="panel-info">
            <div id="foto-jugador"></div>
            <div class="texto-info">
                <div id="info-nombre" class="nombre"></div>
                <div id="info-clubes" class="clubes"></div>
                <div id="info-precio-original" class="precio-original"></div>
                <div id="info-precio" class="precio"></div>
            </div>
        </div>
    </div>

    <script>
        async function grafico_fichajes() {
            const llamado_datos = await fetch('./datos-fichajes.json');
            const datos_json = await llamado_datos.json();
            
            // Invertimos el array completo una vez para que los índices coincidan siempre
            const datos = datos_json.reverse();

            const lista_fechas = datos.map(tupla => (tupla['fecha_fichaje'].split("/"))[2]);
            lista_fechas[10] = '1997 (A)';
            lista_fechas[11] = '1997 (R)';
            lista_fechas[14] = '2000 (C)';
            lista_fechas[15] = '2000 (F)';

            const lista_records = datos.map(tupla => parseFloat(tupla['coste']));
            const lista_inflados = datos.map(tupla => parseFloat(tupla['precio_ajustado']));
            const lista_nombres = datos.map(tupla => tupla['jugador']);

            const lista_etiquetas = [];
            for (let i = 0; i < 21; i++) {
                lista_etiquetas.push({
                    x: i,
                    y: lista_inflados[i] + 40,
                    textangle: -90,
                    xref: 'x',
                    yref: 'y',
                    text: lista_nombres[i],
                    showarrow: false,
                    font: { family: 'Roboto', color: 'white' },
                    bgcolor: 'rgba(0,0,0,0.5)'
                });
            };

            
            lista_etiquetas[1]['y'] = 100;
            lista_etiquetas[3]['y'] = 60;
            lista_etiquetas[5]['y'] = 70;
            lista_etiquetas[12]['y'] = 100;

            const datos_records = {
                x: lista_fechas,
                y: lista_records,
                mode: "lines+markers",
                marker: { color: 'blue', size: 10 },
                name: 'Costo Original',
                hoverinfo: 'none' // Desactivamos el tooltip por defecto de Plotly
            };

            const datos_inflados = {
                x: lista_fechas,
                y: lista_inflados,
                mode: "lines+markers",
                marker: { color: 'red', symbol: 'diamond', size: 10 },
                name: 'Costo Ajustado (Abril 2026)',
                hoverinfo: 'none'
            };

            const forma = {
                yaxis: { title: 'Millones de Euros (€)', gridcolor: '#333', color: 'lightgray' },
                xaxis: { type: 'category', color: 'lightgray', showgrid: false },
                plot_bgcolor: 'black',
                paper_bgcolor: 'black',
                annotations: lista_etiquetas,
                margin: { l: 60, r: 10, b: 40, t: 30 },
                legend: { orientation: 'h', font: { color: 'white' }, y: -0.2 }
            };

            const graficoDiv = document.getElementById('grafico-fichajes');

            // IMPORTANTE: Quitamos staticPlot: true para habilitar el hover
            Plotly.newPlot(graficoDiv, [datos_records, datos_inflados], forma, { displayModeBar: false });

            // --- Lógica de Interacción ---
            graficoDiv.on('plotly_hover', function(data) {
                const punto = data.points[0].pointIndex;
                const j = datos[punto];
                const nombreLimpio = j.jugador.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                
                document.getElementById('panel-info').style.opacity = 1;
                document.getElementById('info-nombre').innerText = j.jugador;
                document.getElementById('info-clubes').innerText = `${j.ultimo_club} ➜ ${j.nuevo_club}`;
                
                // Mostramos ambos precios
                document.getElementById('info-precio-original').innerHTML = `<span class="label-precio">Costo Original</span> ${j.coste} M€`;
                document.getElementById('info-precio').innerHTML = `<span class="label-precio">Ajustado a Hoy</span> ${j.precio_ajustado} M€`;
            
                // Lógica de fotos con excepciones manuales
                let archivoFoto = "";
                
                if (nombreLimpio.includes("conti")) {
                    archivoFoto = "conti.jpg";
                } else if (nombreLimpio.includes("nazario")) {
                    archivoFoto = "ronaldo.webp";
                } else if (nombreLimpio.includes("cristiano")) {
                    archivoFoto = "cristiano.webp";
                } else if (nombreLimpio.includes("denilson")) {
                    archivoFoto = "denilson.webp";
                } else if (nombreLimpio.includes("neymar")) {
                    archivoFoto = "neymar.webp";
                } else {
                    const apellido = nombreLimpio.split(" ").pop();
                    archivoFoto = `${apellido}.webp`;
                }
            
                document.getElementById('foto-jugador').style.backgroundImage = `url('img/${archivoFoto}')`;
            });
            
            graficoDiv.on('plotly_unhover', function() {
                document.getElementById('panel-info').style.opacity = 0;
            });
        }
        grafico_fichajes();
    </script>
</body>
</html>
