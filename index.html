<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">

        <title>Proto</title>

        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    </head>

    <body>
        <div id="grafico-sismos" style="width:2000px;height:2000px"></div>
        <script>

            async function grafico_sismos() {
                const llamado_datos = await fetch('../datos-regiones.json');
                const datos = await llamado_datos.json();

                const lista_frecuencia = datos.map(tupla => parseInt(tupla.cuenta_magnitudes));
                const lista_promedio = datos.map(tupla => parseFloat(tupla.promedio_magnitudes));

                const datos_grafico = [{
                    x: lista_frecuencia,
                    y: lista_promedio,
                    mode: 'markers',
                    type: 'scatter'
                }];

                const lista_etiquetas = [];
                for (let i=0;i<datos.length;i++){
                    lista_etiquetas.push({
                        x: parseInt(datos[i].cuenta_magnitudes),
                        y: parseFloat(datos[i].promedio_magnitudes),
                        ax: 0,
                        ay: -30,
                        xref: 'x',
                        yref: 'y',
                        text: datos[i].region,
                        showarrow: true,
                        arrowhead: 3
                    });
                };

                const forma = {
                    margin: {t: 40},
                    title: {text: 'Sismos en Chile Divididos por Región (Marzo 2012 - Mayo 2025)'},
                    annotations: lista_etiquetas,
                    yaxis: {nticks: 40, title: {text: 'Magnitud promedio en Escala Richter'}},
                    xaxis: {title: {text: 'Cantidad de sismos registrados'}}
                };

                Plotly.newPlot('grafico-sismos', datos_grafico, forma, {staticPlot: true});
            }

            grafico_sismos();

        </script>








    </body>
</html>
