<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Entrega 1 - Fichajes</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>

        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        .container {
            width: 1110px;
            background: #111;
            padding: 20px;
            margin-top: 15px;
            border-radius: 10px;
            border: 1px solid #222;
        }
        #grafico-fichajes {
            width: 100%;
            height: 550px;
        }
        h1 { font-size: 25px; text-align: center; margin: 5px 0; }
        .sub { font-size: 21px; text-align: center; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Inflación del Mercado de Fichajes</h1>
        <div class="sub">Récords históricos ajustados por inflación (Q2 2026)</div>
        <div id="grafico-fichajes"></div>
    </div>

    <script>
        //hice todas las alturas manuals pq quedaban muy raros de otra forma
        const CONFIG_ALTURAS = {
            "1956": -60,
            "1978": 45,
            "1979": -100,
            "1981": 92,
            "1982": -60,
            "1986": 45,
            "1987": -90,
            "1988": 100,
            "1990": -50,
            "1992": 80,
            "1997": -80,
            "1998": 85,
            "1999": -100,
            "2000": 70,  // figo y crespo
            "2001": -100, // zidane
            "2009": -80,
            "2013": 80,
            "2016": -110,
            "2017": -60
        };

        async function cargar() {
            const res = await fetch('./datos-fichajes.json');
            const datosRaw = await res.json();

            // agrupado x año
            const agrupados = {};
            [...datosRaw].reverse().forEach(d => {
                const anio = d.fecha_fichaje.split("/")[2];
                if (!agrupados[anio]) {
                    agrupados[anio] = {
                        anio: anio,
                        jugadores: [d.jugador],
                        coste: parseFloat(d.coste),
                        ajustado: parseFloat(d.precio_ajustado)
                    };
                } else {
                    agrupados[anio].jugadores.push(d.jugador);
                    agrupados[anio].ajustado = Math.max(agrupados[anio].ajustado, parseFloat(d.precio_ajustado));
                    agrupados[anio].coste = Math.max(agrupados[anio].coste, parseFloat(d.coste));
                }
            });

            const lista = Object.values(agrupados).sort((a,b) => a.anio - b.anio);

            const etiquetas = lista.map((d, i) => {
                let ayVal = CONFIG_ALTURAS[d.anio] || (i % 2 === 0 ? -50 : 50);

                return {
                    x: d.anio,
                    y: d.ajustado,
                    text: `<b>${d.jugadores.join('<br>')}</b><br>(${d.anio})`,
                    showarrow: true,
                    arrowcolor: '#444',
                    arrowhead: 0,
                    layer: 'above',
                    ax: 0,
                    ay: ayVal,
                    font: { size: 9, color: '#fff' },
                    bgcolor: 'rgba(0,0,0,0.8)',
                    bordercolor: '#333',
                    borderwidth: 1
                };
            });

            const trace1 = {
                x: lista.map(d => d.anio),
                y: lista.map(d => d.coste),
                name: 'Costo Nominal',
                mode: 'lines+markers',
                line: { color: '#3498db', shape: 'hv', width: 2 },
                marker: { size: 5 }
            };

            const trace2 = {
                x: lista.map(d => d.anio),
                y: lista.map(d => d.ajustado),
                name: 'Costo Ajustado A La Inflación',
                mode: 'lines+markers',
                line: { color: '#e74c3c', width: 3 },
                marker: { size: 8, symbol: 'diamond' }
            };

            const layout = {
                paper_bgcolor: '#111',
                plot_bgcolor: '#111',
                margin: { l: 50, r: 30, b: 40, t: 80 },
                xaxis: { title: 'Año', color: '#fff', gridcolor: '#222', dtick: 10 },
                yaxis: { title: 'Millones de Euros (M €)', color: '#fff', gridcolor: '#222', range: [-180, 420] },
                annotations: etiquetas,
                showlegend: true,
                legend: { font: { color: '#fff' }, orientation: 'h', y: -0.15, x: 0.5, xanchor: 'center' }
            };

            Plotly.newPlot('grafico-fichajes', [trace1, trace2], layout, { staticPlot: true });
        }
        cargar();
    </script>
</body>
</html>
