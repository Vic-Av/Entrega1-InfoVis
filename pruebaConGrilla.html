<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inflación de Fichajes</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000000;
            font-family: Arial, sans-serif;
            color: white;
        }

        .header {
            padding: 10px;
            text-align: center;
            background: #1d1d1d;
        }

        .main-content {
            display: flex;
            width: 100%;
            height: 550px;
        }

        #grafico-fichajes {
            flex: 3;
        }

        #panel-info {
            flex: 1;
            background: #0a0a0a;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #foto-jugador {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid red;
            background-size: cover;
            background-position: center;
            margin-bottom: 15px;
        }

        #btn-sonido {
            margin-top: 10px;
            padding: 8px 14px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #111;
            color: white;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        #btn-sonido:hover {
            background: #222;
        }

        .texto-info { text-align: center; }
        .fecha { font-size: 0.9em; color: #999; margin-bottom: 8px; }
        .nombre { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; }
        .clubes { color: #aaa; font-style: italic; margin-bottom: 15px; }
        .precio { font-size: 1.8em; color: #ff4d4d; font-weight: 900; }
        .precio-original { font-size: 1.2em; color: #3b82f6; margin-top: 10px; }
        .label-precio { font-size: 0.6em; color: #666; display: block; text-transform: uppercase; }
        .contexto { font-size: 0.85em; color: #cccccc; margin-top: 20px; line-height: 1.4; border-top: 1px solid #333; padding-top: 15px; text-align: justify; }
    </style>
</head>

<body>
    <div class="header">
        <h1>Inflación del Mercado de Fichajes</h1>
        <div>La historia del récord de fichaje más caro en el fútbol (1956 - 2017), medido en millones de euros, con su ajuste a la inflación.</div>
        <button id="btn-sonido">🔇 Activar sonido</button>
    </div>

    <div class="main-content">
        <div id="grafico-fichajes"></div>

        <div id="panel-info">
            <div id="foto-jugador"></div>
            <div class="texto-info">
                <div id="info-fecha" class="fecha"></div>
                <div id="info-nombre" class="nombre"></div>
                <div id="info-clubes" class="clubes"></div>
                <div id="info-precio-original" class="precio-original"></div>
                <div id="info-precio" class="precio"></div>
                <div id="info-contexto" class="contexto"></div>
            </div>
        </div>
    </div>

    <script>
        async function grafico_fichajes() {
            const llamado_datos = await fetch('./datos-fichajes.json');
            const datos_json = await llamado_datos.json();

            const datos = datos_json
                .map(dato => {
                    const fecha = prepararFecha(dato.fecha_fichaje);

                    return {
                        ...dato,
                        anio: fecha.anio,
                        fecha_texto: fecha.fecha_texto,
                        orden_fecha: fecha.orden_fecha
                    };
                })
                .sort((a, b) => a.orden_fecha - b.orden_fecha);

            agregarPosicionX(datos);

            const lista_fechas = datos.map(dato => dato.x_grafico);
            const lista_records = datos.map(dato => parseFloat(dato.coste));
            const lista_inflados = datos.map(dato => parseFloat(dato.precio_ajustado));
            const lineas_grilla = crearLineasGrilla(lista_records, lista_inflados);

            let sonidoActivo = false;
            let sintetizador = null;
            let ultimoPuntoSonido = null;
            let ultimoTiempoSonido = 0;

            const btnSonido = document.getElementById('btn-sonido');

            btnSonido.addEventListener('click', async function () {
                await Tone.start();

                if (sintetizador === null) {
                    sintetizador = new Tone.Synth({
                        oscillator: {
                            type: 'sine'
                        },
                        envelope: {
                            attack: 0.01,
                            decay: 0.08,
                            sustain: 0.15,
                            release: 0.18
                        }
                    }).toDestination();

                    sintetizador.volume.value = -12;
                }

                sonidoActivo = !sonidoActivo;
                btnSonido.innerText = sonidoActivo ? '🔊 Sonido activado' : '🔇 Activar sonido';
            });

            const datos_records = {
                x: lista_fechas,
                y: lista_records,
                mode: 'lines+markers',
                line: { color: 'blue', width: 2, shape: 'linear' },
                marker: {
                    color: 'blue',
                    size: 7,
                    opacity: 0.95,
                    line: { color: 'white', width: 1 }
                },
                name: 'Costo Original',
                hoverinfo: 'skip'
            };

            const datos_inflados = {
                x: lista_fechas,
                y: lista_inflados,
                mode: 'lines+markers',
                line: { color: 'red', width: 2, shape: 'linear' },
                marker: {
                    color: 'red',
                    symbol: 'diamond',
                    size: datos.map(() => 9),
                    opacity: 0.95,
                    line: {
                        color: datos.map(() => 'white'),
                        width: datos.map(() => 1)
                    }
                },
                name: 'Costo Ajustado (Abril 2026)',
                hoverinfo: 'none'
            };

            const forma = {
                yaxis: {
                    title: 'Millones de Euros (€)',
                    color: 'lightgray',
                    showgrid: false,
                    zeroline: false
                },
                xaxis: {
                    title: 'Año del fichaje',
                    tickvals: [1960, 1970, 1980, 1990, 2000, 2010, 2020],
                    ticktext: ['1960', '1970', '1980', '1990', '2000', '2010', '2020'],
                    color: 'lightgray',
                    showgrid: false,
                    zeroline: false
                },
                plot_bgcolor: 'black',
                paper_bgcolor: 'black',
                shapes: lineas_grilla,
                margin: { l: 60, r: 10, b: 40, t: 30 },
                legend: { orientation: 'h', font: { color: 'white' }, y: -0.2 }
            };

            const graficoDiv = document.getElementById('grafico-fichajes');

            Plotly.newPlot(graficoDiv, [datos_records, datos_inflados], forma, { displayModeBar: false });

            graficoDiv.on('plotly_hover', function (evento) {
                const punto = evento.points[0].pointIndex;
                const jugador = datos[punto];

                iluminarPunto(graficoDiv, datos, punto);
                actualizarPanel(jugador);

                const ahora = Date.now();

                if (sonidoActivo && evento.points[0].curveNumber === 1 && punto !== ultimoPuntoSonido && ahora - ultimoTiempoSonido > 350) {
                    reproducirSonidoFichaje(
                        parseFloat(jugador.coste),
                        parseFloat(jugador.precio_ajustado),
                        lista_records,
                        lista_inflados,
                        sintetizador
                    );

                    ultimoPuntoSonido = punto;
                    ultimoTiempoSonido = ahora;
                }
            });

            graficoDiv.on('plotly_unhover', function () {
                quitarIluminacion(graficoDiv, datos);
            });
        }

        function prepararFecha(texto) {
            texto = String(texto).trim();

            if (texto.includes('/')) {
                const partes = texto.split('/');
                const dia = parseInt(partes[0]);
                const mes = parseInt(partes[1]);
                const anio = parseInt(partes[2]);
                return crearFecha(dia, mes, anio);
            }

            if (texto.includes('-')) {
                const partes = texto.split('-');
                const anio = parseInt(partes[0]);
                const mes = parseInt(partes[1]);
                const dia = parseInt(partes[2]);
                return crearFecha(dia, mes, anio);
            }

            const anio = parseInt(texto);
            return crearFecha(1, 1, anio);
        }

        function crearFecha(dia, mes, anio) {
            const diaTexto = String(dia).padStart(2, '0');
            const mesTexto = String(mes).padStart(2, '0');
            const fechaTexto = `${diaTexto}/${mesTexto}/${anio}`;
            const ordenFecha = anio * 10000 + mes * 100 + dia;

            return {
                anio: anio,
                fecha_texto: fechaTexto,
                orden_fecha: ordenFecha
            };
        }

        function agregarPosicionX(datos) {
            const grupos = {};

            for (let i = 0; i < datos.length; i++) {
                const anio = datos[i].anio;

                if (!grupos[anio]) {
                    grupos[anio] = [];
                }

                grupos[anio].push(datos[i]);
            }

            for (const anio in grupos) {
                const grupo = grupos[anio];
                const cantidad = grupo.length;
                const anioNumero = parseInt(anio);

                if (cantidad === 1) {
                    grupo[0].x_grafico = anioNumero;
                } else {
                    const separacion = 0.65;
                    const inicio = anioNumero - ((cantidad - 1) * separacion) / 2;

                    for (let i = 0; i < cantidad; i++) {
                        grupo[i].x_grafico = inicio + i * separacion;
                    }
                }
            }
        }

        function crearLineasGrilla(lista_records, lista_inflados) {
            const maximo = Math.max(...lista_records, ...lista_inflados);
            const limite = Math.ceil(maximo / 50) * 50;
            const lineas = [];

            for (let i = 1; i <= 4; i++) {
                const valor = limite * i / 5;

                lineas.push({
                    type: 'line',
                    xref: 'paper',
                    x0: 0,
                    x1: 1,
                    yref: 'y',
                    y0: valor,
                    y1: valor,
                    line: {
                        color: 'rgba(255,255,255,0.14)',
                        width: 1
                    }
                });
            }

            return lineas;
        }

        function actualizarPanel(jugador) {
            const nombreLimpio = jugador.jugador.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

            document.getElementById('panel-info').style.opacity = 1;
            document.getElementById('info-fecha').innerText = `Fecha del traspaso: ${jugador.fecha_texto}`;
            document.getElementById('info-nombre').innerText = jugador.jugador;
            document.getElementById('info-clubes').innerText = `${jugador.ultimo_club} ➜ ${jugador.nuevo_club}`;
            document.getElementById('info-precio-original').innerHTML = `<span class="label-precio">Costo Original</span> ${jugador.coste} M€`;
            document.getElementById('info-precio').innerHTML = `<span class="label-precio">Ajustado a Hoy</span> ${jugador.precio_ajustado} M€`;
            document.getElementById('info-contexto').innerText = jugador.contexto || '';

            let archivoFoto = '';

            if (nombreLimpio.includes('conti')) {
                archivoFoto = 'conti.jpg';
            } else if (nombreLimpio.includes('nazario')) {
                archivoFoto = 'ronaldo.webp';
            } else if (nombreLimpio.includes('figo')) {
                archivoFoto = 'figo.webp';
            } else if (nombreLimpio.includes('cristiano')) {
                archivoFoto = 'cristiano.webp';
            } else if (nombreLimpio.includes('denilson')) {
                archivoFoto = 'denilson.webp';
            } else if (nombreLimpio.includes('neymar')) {
                archivoFoto = 'neymar.webp';
            } else {
                const apellido = nombreLimpio.split(' ').pop();
                archivoFoto = `${apellido}.webp`;
            }

            document.getElementById('foto-jugador').style.backgroundImage = `url('img/${archivoFoto}')`;
        }

        function iluminarPunto(graficoDiv, datos, indice) {
            const tamanos = [];
            const anchosBorde = [];
            const coloresBorde = [];

            for (let i = 0; i < datos.length; i++) {
                if (i === indice) {
                    tamanos.push(15);
                    anchosBorde.push(3);
                    coloresBorde.push('white');
                } else {
                    tamanos.push(9);
                    anchosBorde.push(1);
                    coloresBorde.push('white');
                }
            }

            Plotly.restyle(graficoDiv, {
                'marker.size': [tamanos],
                'marker.line.width': [anchosBorde],
                'marker.line.color': [coloresBorde]
            }, [1]);
        }

        function quitarIluminacion(graficoDiv, datos) {
            const tamanos = datos.map(() => 9);
            const anchosBorde = datos.map(() => 1);
            const coloresBorde = datos.map(() => 'white');

            Plotly.restyle(graficoDiv, {
                'marker.size': [tamanos],
                'marker.line.width': [anchosBorde],
                'marker.line.color': [coloresBorde]
            }, [1]);
        }

        function reproducirSonidoFichaje(costoOriginal, costoAjustado, lista_records, lista_inflados, sintetizador) {
            if (!sintetizador) return;

            const minimo = Math.min(...lista_records, ...lista_inflados);
            const maximo = Math.max(...lista_records, ...lista_inflados);

            const escala = [
                'C3', 'D3', 'E3', 'G3', 'A3',
                'C4', 'D4', 'E4', 'G4', 'A4',
                'C5', 'D5', 'E5', 'G5', 'A5',
                'C6', 'D6', 'E6'
            ];

            let indiceOriginal = Math.round(escalar(costoOriginal, minimo, maximo, 0, escala.length - 7));
            let indiceAjustado = Math.round(escalar(costoAjustado, minimo, maximo, 5, escala.length - 1));

            if (indiceAjustado <= indiceOriginal) {
                indiceAjustado = Math.min(indiceOriginal + 3, escala.length - 1);
            }

            const notaOriginal = escala[indiceOriginal];
            const notaAjustada = escala[indiceAjustado];
            const ahora = Tone.now();

            sintetizador.triggerAttackRelease(notaOriginal, '16n', ahora);
            sintetizador.triggerAttackRelease(notaAjustada, '8n', ahora + 0.18);
        }

        function escalar(valor, minEntrada, maxEntrada, minSalida, maxSalida) {
            return minSalida + ((valor - minEntrada) / (maxEntrada - minEntrada)) * (maxSalida - minSalida);
        }
        grafico_fichajes();
    </script>
</body>

</html>
